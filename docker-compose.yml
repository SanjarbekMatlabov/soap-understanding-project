services:
  client:
    build: ./client
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - server
    ports:
      - "49200:3000"
    volumes:
      - ./client:/client
      - /client/node_modules    
      
  server:
    build: ./server
    environment:
      PORT: ${PORT}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - db
    ports:
      - "1048:4000"
    volumes:
      - ./server:/server
      - /server/node_modules       
      
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data  
  
volumes:
  pgdata: